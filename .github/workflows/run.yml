name: Sitoproxy Auto Bot

on:
  schedule:
    - cron: '0 */1 * * *' # اجرای دقیق و پایدار راس هر ۱ ساعت یک‌بار
  workflow_dispatch: # دکمه اجرای دستی برای تست

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # استفاده از نسخه پایدارتر ۳.۱۰

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Proxy Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
